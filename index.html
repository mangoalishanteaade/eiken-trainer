<!DOCTYPE html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #fff0f6 0%, #fff4e6 30%, #e7f5ff 65%, #ebfbee 100%);
      font-family: 'Nunito', 'Hiragino Maru Gothic ProN', 'M PLUS Rounded 1c', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 56px;
      position: relative;
      overflow-x: hidden;
    }
    @keyframes popIn { from { opacity:0; transform:scale(0.9) } to { opacity:1; transform:scale(1) } }
    @keyframes slideUp { from { opacity:0; transform:translateY(18px) scale(0.96) } to { opacity:1; transform:translateY(0) scale(1) } }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.45 } }
    @keyframes bounce { 0%,100% { transform:translateY(0) } 50% { transform:translateY(-6px) } }
    button { font-family: 'Nunito', 'Hiragino Maru Gothic ProN', 'M PLUS Rounded 1c', sans-serif; cursor: pointer; }
    .section { width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }
    .hidden { display: none !important; }
    .done-msg { margin-top: 24px; font-size: 20px; font-weight: 900; color: #fa5252; animation: bounce 0.6s infinite; text-align: center; }
    .over-msg { font-size: 14px; font-weight: 800; color: #fa5252; animation: pulse 0.9s infinite; }
  </style>
</head>
<body>

  <!-- Ambient blobs -->

  </div>

  <!-- ── WRITING SECTION ── -->

    <div style="text-align:center;margin-bottom:20px;">
      <div style="font-size:11px;font-weight:800;letter-spacing:4px;color:#c4c4cc;text-transform:uppercase;margin-bottom:6px;">英検 WRITING PRACTICE</div>
      <h1 id="wH1" style="margin:0;font-size:clamp(28px,5.5vw,46px);font-weight:900;letter-spacing:-0.5px;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;transition:background 0.4s;"></h1>
      <div id="wSub" style="font-size:13px;color:#bbb;margin-top:5px;font-weight:700;"></div>
    </div>

    <!-- Level pills 3x2 -->
    <div id="wPills" style="display:grid;grid-template-columns:repeat(3,auto);gap:8px;justify-content:center;margin-bottom:26px;"></div>

    <!-- Topic card -->
    <div id="wCard" style="background:#fff;border-radius:24px;padding:30px 34px;max-width:580px;width:100%;margin-bottom:4px;position:relative;overflow:hidden;">
      <div id="wBar" style="position:absolute;top:0;left:0;right:0;height:5px;border-radius:24px 24px 0 0;"></div>
      <div id="wTopicLabel" style="font-size:11px;font-weight:800;letter-spacing:4px;text-transform:uppercase;margin-bottom:16px;">📝 Topic</div>
      <div id="wTopicText" style="font-size:clamp(15px,2.5vw,20px);line-height:1.75;color:#222;font-weight:700;margin-bottom:20px;"></div>
      <div id="wPoints" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
      <div id="wMins" style="margin-top:16px;font-size:12px;color:#bbb;font-weight:600;"></div>
    </div>

      <div style="width:116px;height:116px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;">

        <div id="wStatus" style="font-size:10px;color:#bbb;font-weight:700;letter-spacing:2px;margin-top:4px;text-transform:uppercase;"></div>
      </div>
    </div>

// ── HELPERS ─────────────────────────────────────────────────────────
function pad2(n) { return String(n).padStart(2, "0"); }
function formatTime(s) { return pad2(Math.floor(s/60)) + ":" + pad2(s%60); }
function formatSW(ms) { const t=Math.floor(ms/1000), m=Math.floor(t/60), s=t%60; return m>0 ? m+":"+pad2(s) : pad2(s); }
function formatTarget(sec) { if(sec<60) return sec+"秒"; const m=Math.floor(sec/60), s=sec%60; return s===0 ? m+"分" : m+"分"+s+"秒"; }
function pick(arr, excludeVal) {
  const pool = excludeVal != null ? arr.filter(x => (x.topic||x.q) !== excludeVal) : arr;
  return pool[Math.floor(Math.random() * pool.length)];
}
function chipStyle(c, i) {
  const alphas = ["18","28","38"];
  return `font-size:12px;padding:5px 14px;background:${c.color}${alphas[i%3]};border:1.5px solid ${c.color}44;border-radius:100px;color:${c.dark};font-weight:700;letter-spacing:0.3px;`;
}
function primaryBtnStyle(color, dark, big) {
  return `background:linear-gradient(135deg,${dark},${color});color:#fff;border:none;border-radius:100px;padding:${big?"12px 32px":"12px 28px"};font-size:${big?15:14}px;font-weight:800;letter-spacing:${big?1:0.3}px;box-shadow:0 4px 18px ${color}55;transition:all 0.15s;`;
}
function dashedBtnStyle(c) {
  return `background:#fff;color:${c.color};border:2px dashed ${c.color}88;border-radius:100px;padding:12px 32px;font-size:14px;font-weight:800;letter-spacing:0.3px;box-shadow:0 2px 8px rgba(0,0,0,0.05);`;
}

// ── STATE ────────────────────────────────────────────────────────────
const state = {
  mode: "writing",
  wLevel: "2級", wTopic: null, wTimeLeft: 0, wRunning: false,
  sLevel: "2級", sQ: null, sRunning: false, sElapsed: 0,
};
let wTimer = null, sTimer = null, sBase = 0;

// ── INIT ─────────────────────────────────────────────────────────────
function init() {
  state.wTopic = pick(TOPICS[state.wLevel]);
  state.wTimeLeft = WMIN[state.wLevel] * 60;
  state.sQ = pick(SPEAKING[state.sLevel].questions);
  renderAll();
}

// ── MODE ─────────────────────────────────────────────────────────────
function setMode(m) {
  state.mode = m;
  const isW = m === "writing";
  document.getElementById("secW").classList.toggle("hidden", !isW);
  document.getElementById("secS").classList.toggle("hidden", isW);
  const activeTabStyle = "background:#fff;color:#333;border:none;border-radius:100px;padding:9px 22px;font-size:14px;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,0.1);transition:all 0.2s;";
  const inactiveTabStyle = "background:transparent;color:#999;border:none;border-radius:100px;padding:9px 22px;font-size:14px;font-weight:800;box-shadow:none;transition:all 0.2s;";
  document.getElementById("tabW").style.cssText = isW ? activeTabStyle : inactiveTabStyle;
  document.getElementById("tabS").style.cssText = isW ? inactiveTabStyle : activeTabStyle;
}

// ── WRITING RENDER ───────────────────────────────────────────────────
function renderWriting() {
  const lv = state.wLevel, c = LC[lv];
  const total = WMIN[lv] * 60, t = state.wTimeLeft;
  const pct = t / total;
  const isLow = t < 60, isMid = t < 180 && t >= 60, isDone = t === 0;
  const ringColor = (isDone || isLow) ? "#fa5252" : isMid ? "#ff922b" : c.color;

  // Blob
  document.getElementById("blob1").style.background = c.color;

  // Header
  document.getElementById("wH1").style.backgroundImage = `linear-gradient(135deg, ${c.dark}, ${c.color})`;
  document.getElementById("wH1").textContent = `${c.emoji} Let's Write!`;
  document.getElementById("wSub").textContent = `ライティング ／ 目安 ${WMIN[lv]}分`;

  // Pills
  renderPills("wPills", lv, (x) => wSetLevel(x));

  // Card
  const card = document.getElementById("wCard");
  card.style.boxShadow = `0 8px 40px ${c.color}22, 0 2px 12px rgba(0,0,0,0.06)`;
  card.style.border = `2px solid ${c.color}33`;
  document.getElementById("wBar").style.background = `linear-gradient(90deg, ${c.dark}, ${c.color})`;
  document.getElementById("wTopicLabel").style.color = c.color;
  document.getElementById("wTopicText").textContent = state.wTopic.topic;
  document.getElementById("wMins").textContent = `⏱ 目安時間: ${WMIN[lv]}分`;

  // Points
  const pts = document.getElementById("wPoints");
  pts.innerHTML = state.wTopic.points.map((p, i) =>
    `<span style="${chipStyle(c, i)}">${p}</span>`
  ).join("");

  // Ring timer (conic-gradient)
  document.getElementById("wRing").style.background =
    `conic-gradient(${ringColor} ${pct * 360}deg, ${ringColor}20 0deg)`;
  const timeEl = document.getElementById("wTimeText");
  timeEl.textContent = formatTime(t);
  timeEl.style.color = isDone ? "#fa5252" : "#222";
  document.getElementById("wStatus").textContent = isDone ? "DONE! 🎉" : state.wRunning ? "running" : "ready";

  // Buttons
  const startBtn = document.getElementById("wStartBtn");
  const pauseBtn = document.getElementById("wPauseBtn");
  const resetBtn = document.getElementById("wResetBtn");

  startBtn.classList.toggle("hidden", state.wRunning || isDone);
  pauseBtn.classList.toggle("hidden", !state.wRunning);
  resetBtn.classList.toggle("hidden", t === total || isDone);

  startBtn.style.cssText = primaryBtnStyle(c.color, c.color + "cc", true);
  startBtn.textContent = "▶ START";
  pauseBtn.style.cssText = `background:#fff;color:${c.color};border:2px solid ${c.color};border-radius:100px;padding:11px 28px;font-size:15px;font-weight:800;`;
  pauseBtn.textContent = "⏸ PAUSE";

  // Next button
  const nextBtn = document.getElementById("wNextBtn");
  nextBtn.style.cssText = dashedBtnStyle(c);
  nextBtn.textContent = "🎲 次のお題へ";

  // Done
  document.getElementById("wDone").classList.toggle("hidden", !isDone);
}

// ── SPEAKING RENDER ──────────────────────────────────────────────────
function renderSpeaking() {
  const lv = state.sLevel, c = LC[lv], data = SPEAKING[lv];
  const targetMs = data.targetSec * 1000, el = state.sElapsed;
  const pct = Math.min(1, el / targetMs);
  const over = el >= targetMs && el > 0;
  const swColor = over ? "#fa5252" : el >= targetMs * 0.75 ? "#ff922b" : c.color;

  // Header
  document.getElementById("sH1").style.backgroundImage = `linear-gradient(135deg, ${c.dark}, ${c.color})`;
  document.getElementById("sH1").textContent = `${c.emoji} Let's Speak!`;
  document.getElementById("sSub").textContent = `${data.format} ／ 目標 ${formatTarget(data.targetSec)}`;

  // Pills
  renderPills("sPills", lv, (x) => sSetLevel(x));

  // Card
  const card = document.getElementById("sCard");
  card.style.boxShadow = `0 8px 40px ${c.color}18, 0 2px 10px rgba(0,0,0,0.05)`;
  card.style.border = `1.5px solid ${c.color}28`;
  document.getElementById("sBar").style.background = `linear-gradient(90deg, ${c.dark}, ${c.color})`;
  document.getElementById("sQLabel").style.color = c.color;
  document.getElementById("sQText").textContent = `"${state.sQ.q}"`;

  const hints = document.getElementById("sHints");
  hints.innerHTML = state.sQ.hints.map((h, i) =>
    `<span style="${chipStyle(c, i)}">${h}</span>`
  ).join("");

  // Stopwatch
  const bigEl = document.getElementById("sBig");
  bigEl.textContent = formatSW(el);
  bigEl.style.color = swColor;
  bigEl.style.textShadow = state.sRunning ? `0 0 40px ${swColor}28` : "none";

  const fill = document.getElementById("sBarFill");
  fill.style.width = `${pct * 100}%`;
  fill.style.background = over ? "#fa5252" : el >= targetMs * 0.75 ? "#ff922b" : `linear-gradient(90deg, ${c.dark}, ${c.color})`;

  document.getElementById("sTarget").textContent = `目標 ${formatTarget(data.targetSec)}以内`;

  // Buttons
  const startBtn = document.getElementById("sStartBtn");
  const stopBtn = document.getElementById("sStopBtn");
  const resetBtn = document.getElementById("sResetBtn");

  startBtn.classList.toggle("hidden", state.sRunning);
  stopBtn.classList.toggle("hidden", !state.sRunning);
  resetBtn.classList.toggle("hidden", el === 0);

  startBtn.style.cssText = primaryBtnStyle(c.color, c.dark, false);
  startBtn.textContent = "▶ スタート";

  // Next / over
  const nextBtn = document.getElementById("sNextBtn");
  nextBtn.style.cssText = dashedBtnStyle(c);
  nextBtn.textContent = "🎲 次の問題へ";

  document.getElementById("sOver").classList.toggle("hidden", !over);
}

// ── PILLS ────────────────────────────────────────────────────────────
function renderPills(containerId, activeLevel, onClick) {
  const container = document.getElementById(containerId);
  container.innerHTML = LEVELS.map(lv => {
    const c = LC[lv], active = lv === activeLevel;
    const bg = active ? `linear-gradient(135deg, ${c.dark}, ${c.color})` : "#fff";
    const color = active ? "#fff" : c.color;
    const shadow = active ? `0 4px 14px ${c.color}44` : "none";
    const scale = active ? "scale(1.08)" : "scale(1)";
    return `<button onclick="(${onClick.toString()})('${lv}')"
      style="background:${bg};color:${color};border:2px solid ${c.color};border-radius:100px;padding:7px 16px;font-size:14px;font-weight:800;transition:all 0.2s;box-shadow:${shadow};transform:${scale};"
    >${c.emoji} ${lv}</button>`;
  }).join("");
}

function renderAll() {
  renderWriting();
  renderSpeaking();
}

// ── WRITING ACTIONS ──────────────────────────────────────────────────
function wSetLevel(lv) {
  clearInterval(wTimer); wTimer = null;
  state.wLevel = lv;
  state.wTopic = pick(TOPICS[lv]);
  state.wTimeLeft = WMIN[lv] * 60;
  state.wRunning = false;
  // Trigger card animation by re-cloning
  animateCard("wCard", "popIn");
  renderWriting();
}

function wStart() {
  state.wRunning = true;
  clearInterval(wTimer);
  wTimer = setInterval(() => {
    if (state.wTimeLeft <= 1) {
      clearInterval(wTimer); wTimer = null;
      state.wTimeLeft = 0;
      state.wRunning = false;
    } else {
      state.wTimeLeft--;
    }
    renderWriting();
  }, 1000);
  renderWriting();
}

function wPause() {
  clearInterval(wTimer); wTimer = null;
  state.wRunning = false;
  renderWriting();
}

function wReset() {
  clearInterval(wTimer); wTimer = null;
  state.wTimeLeft = WMIN[state.wLevel] * 60;
  state.wRunning = false;
  renderWriting();
}

function wNewTopic() {
  clearInterval(wTimer); wTimer = null;
  state.wTopic = pick(TOPICS[state.wLevel], state.wTopic.topic);
  state.wTimeLeft = WMIN[state.wLevel] * 60;
  state.wRunning = false;
  animateCard("wCard", "popIn");
  renderWriting();
}

// ── SPEAKING ACTIONS ─────────────────────────────────────────────────
function sSetLevel(lv) {
  clearInterval(sTimer); sTimer = null;
  state.sLevel = lv;
  state.sQ = pick(SPEAKING[lv].questions);
  state.sRunning = false;
  state.sElapsed = 0;
  animateCard("sCard", "slideUp");
  renderSpeaking();
}

function sStart() {
  state.sRunning = true;
  sBase = performance.now() - state.sElapsed;
  clearInterval(sTimer);
  sTimer = setInterval(() => {
    state.sElapsed = performance.now() - sBase;
    renderSpeaking();
  }, 200);
  renderSpeaking();
}

function sStop() {
  clearInterval(sTimer); sTimer = null;
  state.sRunning = false;
  renderSpeaking();
}

function sReset() {
  clearInterval(sTimer); sTimer = null;
  state.sRunning = false;
  state.sElapsed = 0;
  renderSpeaking();
}

function sNewQ() {
  clearInterval(sTimer); sTimer = null;
  state.sQ = pick(SPEAKING[state.sLevel].questions, state.sQ.q);
  state.sRunning = false;
  state.sElapsed = 0;
  animateCard("sCard", "slideUp");
  renderSpeaking();
}

// ── ANIMATION HELPER ─────────────────────────────────────────────────
function animateCard(id, anim) {
  const el = document.getElementById(id);
  el.style.animation = "none";
  el.offsetHeight; // force reflow
  el.style.animation = `${anim} 0.35s cubic-bezier(0.34,1.56,0.64,1)`;
}

// ── START ────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>

      flex-direction: column;
      align-items: center;
      padding: 28px 16px 56px;
      position: relative;
      overflow-x: hidden;
    }

    .hidden { display: none !important; }
    .done-msg { margin-top: 24px; font-size: 20px; font-weight: 900; color: #fa5252; animation: bounce 0.6s infinite; text-align: center; }

    { q:"Agree or disagree: Nuclear power is essential for a sustainable future.", hints:["energy","safety","climate"] },
    { q:"Agree or disagree: Public funding for space exploration is justified.", hints:["science","cost","survival"] },
    { q:"Agree or disagree: Democracy is the most effective form of government.", hints:["freedom","efficiency","stability"] },
    { q:"Agree or disagree: Capital punishment should be abolished worldwide.", hints:["human rights","deterrence","justice"] },
    { q:"Agree or disagree: The nation-state is no longer a viable unit of political organization.", hints:["sovereignty","globalization","identity"] },
    { q:"Agree or disagree: Social media does more harm than good to society.", hints:["mental health","information","democracy"] },
    { q:"Agree or disagree: Developed nations have a moral obligation to accept refugees.", hints:["humanitarianism","security","integration"] },
    { q:"Agree or disagree: Genetic engineering for human enhancement should be permitted.", hints:["ethics","science","equality"] },
    { q:"Agree or disagree: Mass surveillance by governments is justified in the interest of security.", hints:["privacy","safety","power"] },
    { q:"Agree or disagree: Free trade benefits all countries equally.", hints:["developing nations","inequality","growth"] },
    { q:"Agree or disagree: The United Nations is effective in maintaining global peace.", hints:["sovereignty","conflict","reform"] },
    { q:"Agree or disagree: Corporate social responsibility should be legally mandated.", hints:["environment","profit","accountability"] },
    { q:"Agree or disagree: Technology is making humans less capable of critical thinking.", hints:["cognitive dependency","information overload","education"] },
    { q:"Agree or disagree: Animal testing for medical research should be banned.", hints:["ethics","science","alternatives"] },
    { q:"Agree or disagree: The media has too much influence over public opinion.", hints:["democracy","bias","responsibility"] },
    { q:"Agree or disagree: English dominance is threatening linguistic diversity.", hints:["culture","global communication","education"] },
    { q:"Agree or disagree: Overpopulation is the greatest environmental threat.", hints:["resources","policy","development"] },
    { q:"Agree or disagree: Human colonization of Mars is essential for our species' survival.", hints:["existential risk","cost","ethics"] },
    { q:"Agree or disagree: Nationalism is a growing threat to international cooperation.", hints:["identity","trade","security"] },
    { q:"Agree or disagree: The private sector is more efficient than the public sector.", hints:["competition","accountability","public good"] },
    { q:"Agree or disagree: Climate change poses a greater threat than terrorism.", hints:["timeline","policy","scale"] },
    { q:"Agree or disagree: Wealth inequality is the defining challenge of the 21st century.", hints:["social mobility","policy","automation"] },
    { q:"Agree or disagree: Autonomous weapons systems should be banned internationally.", hints:["ethics","security","accountability"] },
    { q:"Agree or disagree: Cultural relativism undermines the concept of universal human rights.", hints:["philosophy","policy","sovereignty"] },
    { q:"Agree or disagree: The internet has done more good than harm to society.", hints:["access","misinformation","privacy"] },
    { q:"Agree or disagree: Economic interdependence prevents military conflict between nations.", hints:["trade","history","geopolitics"] },
  ]},
};

// ── HELPERS ─────────────────────────────────────────────────────────
function pad2(n) { return String(n).padStart(2, "0"); }
function formatTime(s) { return pad2(Math.floor(s/60)) + ":" + pad2(s%60); }
function formatSW(ms) { const t=Math.floor(ms/1000), m=Math.floor(t/60), s=t%60; return m>0 ? m+":"+pad2(s) : pad2(s); }
function formatTarget(sec) { if(sec<60) return sec+"秒"; const m=Math.floor(sec/60), s=sec%60; return s===0 ? m+"分" : m+"分"+s+"秒"; }
function pick(arr, excludeVal) {
  const pool = excludeVal != null ? arr.filter(x => (x.topic||x.q) !== excludeVal) : arr;
  return pool[Math.floor(Math.random() * pool.length)];
}
function pick5(arr) {
  return [...arr].sort(() => Math.random() - 0.5).slice(0, 5);
}
function chipStyle(c, i) {
  const alphas = ["18","28","38"];
  return `font-size:12px;padding:5px 14px;background:${c.color}${alphas[i%3]};border:1.5px solid ${c.color}44;border-radius:100px;color:${c.dark};font-weight:700;letter-spacing:0.3px;`;
}
function primaryBtnStyle(color, dark, big) {
  return `background:linear-gradient(135deg,${dark},${color});color:#fff;border:none;border-radius:100px;padding:${big?"12px 32px":"12px 28px"};font-size:${big?15:14}px;font-weight:800;letter-spacing:${big?1:0.3}px;box-shadow:0 4px 18px ${color}55;transition:all 0.15s;`;
}
function dashedBtnStyle(c) {
  return `background:#fff;color:${c.color};border:2px dashed ${c.color}88;border-radius:100px;padding:12px 32px;font-size:14px;font-weight:800;letter-spacing:0.3px;box-shadow:0 2px 8px rgba(0,0,0,0.05);`;
}

// ── STATE ────────────────────────────────────────────────────────────
const state = {
  mode: "writing",
  wLevel: "2級", wTopic: null, wTimeLeft: 0, wRunning: false,
  sLevel: "2級", sQ: null, sRunning: false, sElapsed: 0,
  // 1級 special
  s1Questions: [],
  s1Selected: null,
  s1PrepLeft: 60,
  s1PrepRunning: false,
};
let wTimer = null, sTimer = null, s1PrepTimer = null, sBase = 0;

// ── INIT ─────────────────────────────────────────────────────────────
function init() {
  state.wTopic = pick(TOPICS[state.wLevel]);
  state.wTimeLeft = WMIN[state.wLevel] * 60;
  state.sQ = pick(SPEAKING[state.sLevel].questions);
  renderAll();
}

// ── MODE ─────────────────────────────────────────────────────────────
function setMode(m) {
  state.mode = m;
  const isW = m === "writing";
  document.getElementById("secW").classList.toggle("hidden", !isW);
  document.getElementById("secS").classList.toggle("hidden", isW);
  const activeTabStyle = "background:#fff;color:#333;border:none;border-radius:100px;padding:9px 22px;font-size:14px;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,0.1);transition:all 0.2s;";
  const inactiveTabStyle = "background:transparent;color:#999;border:none;border-radius:100px;padding:9px 22px;font-size:14px;font-weight:800;box-shadow:none;transition:all 0.2s;";
  document.getElementById("tabW").style.cssText = isW ? activeTabStyle : inactiveTabStyle;
  document.getElementById("tabS").style.cssText = isW ? inactiveTabStyle : activeTabStyle;
}

// ── WRITING RENDER ───────────────────────────────────────────────────
function renderWriting() {
  const lv = state.wLevel, c = LC[lv];
  const total = WMIN[lv] * 60, t = state.wTimeLeft;
  const pct = t / total;
  const isLow = t < 60, isMid = t < 180 && t >= 60, isDone = t === 0;
  const ringColor = (isDone || isLow) ? "#fa5252" : isMid ? "#ff922b" : c.color;

  document.getElementById("blob1").style.background = c.color;
  document.getElementById("wH1").style.backgroundImage = `linear-gradient(135deg, ${c.dark}, ${c.color})`;
  document.getElementById("wH1").textContent = `${c.emoji} Let's Write!`;
  document.getElementById("wSub").textContent = `ライティング ／ 目安 ${WMIN[lv]}分`;

  renderPills("wPills", lv, (x) => wSetLevel(x));

  const card = document.getElementById("wCard");
  card.style.boxShadow = `0 8px 40px ${c.color}22, 0 2px 12px rgba(0,0,0,0.06)`;
  card.style.border = `2px solid ${c.color}33`;
  document.getElementById("wBar").style.background = `linear-gradient(90deg, ${c.dark}, ${c.color})`;
  document.getElementById("wTopicLabel").style.color = c.color;
  document.getElementById("wTopicText").textContent = state.wTopic.topic;
  document.getElementById("wMins").textContent = `⏱ 目安時間: ${WMIN[lv]}分`;

  document.getElementById("wPoints").innerHTML = state.wTopic.points.map((p, i) =>
    `<span style="${chipStyle(c, i)}">${p}</span>`).join("");

  document.getElementById("wRing").style.background =
    `conic-gradient(${ringColor} ${pct * 360}deg, ${ringColor}20 0deg)`;
  const timeEl = document.getElementById("wTimeText");
  timeEl.textContent = formatTime(t);
  timeEl.style.color = isDone ? "#fa5252" : "#222";
  document.getElementById("wStatus").textContent = isDone ? "DONE! 🎉" : state.wRunning ? "running" : "ready";

  const startBtn = document.getElementById("wStartBtn");
  const pauseBtn = document.getElementById("wPauseBtn");
  const resetBtn = document.getElementById("wResetBtn");
  startBtn.classList.toggle("hidden", state.wRunning || isDone);
  pauseBtn.classList.toggle("hidden", !state.wRunning);
  resetBtn.classList.toggle("hidden", t === total || isDone);

  startBtn.style.cssText = primaryBtnStyle(c.color, c.color + "cc", true);
  startBtn.textContent = "▶ START";
  pauseBtn.style.cssText = `background:#fff;color:${c.color};border:2px solid ${c.color};border-radius:100px;padding:11px 28px;font-size:15px;font-weight:800;`;
  pauseBtn.textContent = "⏸ PAUSE";

  document.getElementById("wNextBtn").style.cssText = dashedBtnStyle(c);
  document.getElementById("wDone").classList.toggle("hidden", !isDone);
}

// ── SPEAKING RENDER ──────────────────────────────────────────────────
function renderSpeaking() {
  const lv = state.sLevel, c = LC[lv], data = SPEAKING[lv];
  const is1kyu = lv === "1級";
  const inSelectPhase = is1kyu && state.s1Selected === null;

  document.getElementById("sH1").style.backgroundImage = `linear-gradient(135deg, ${c.dark}, ${c.color})`;
  document.getElementById("sH1").textContent = `${c.emoji} Let's Speak!`;
  document.getElementById("sSub").textContent = is1kyu
    ? `${data.format} ／ 準備1分 → スピーチ2分`
    : `${data.format} ／ 目標 ${formatTarget(data.targetSec)}`;

  renderPills("sPills", lv, (x) => sSetLevel(x));

  // Show/hide panels
  document.getElementById("s1Choose").classList.toggle("hidden", !inSelectPhase);
  document.getElementById("sCard").classList.toggle("hidden", inSelectPhase);
  document.getElementById("sSwCard").classList.toggle("hidden", inSelectPhase);

  if (inSelectPhase) {
    // Render 1級 selection UI
    const prepLeft = state.s1PrepLeft;
    const prepEl = document.getElementById("s1PrepDisplay");
    prepEl.textContent = formatTime(prepLeft);
    prepEl.style.color = prepLeft <= 10 ? "#fa5252" : "#7950f2";
    document.getElementById("s1PrepStatus").textContent =
      prepLeft === 0 ? "TIME UP" : state.s1PrepRunning ? "counting" : "ready";

    document.getElementById("s1Questions").innerHTML = state.s1Questions.map((q, idx) => `
      <button onclick="s1SelectQ(${idx})" style="
        background:#fff;border:2px solid #7950f222;border-radius:16px;
        padding:16px 20px;text-align:left;cursor:pointer;
        font-family:inherit;font-size:clamp(14px,2.2vw,16px);font-weight:700;
        color:#222;line-height:1.6;transition:all 0.18s;
        box-shadow:0 2px 12px rgba(121,80,242,0.07);
        animation:fadeIn 0.3s ease ${idx*0.06}s both;
      "
      onmouseover="this.style.background='#f3f0ff';this.style.borderColor='#7950f255';this.style.boxShadow='0 4px 20px rgba(121,80,242,0.15)'"
      onmouseout="this.style.background='#fff';this.style.borderColor='#7950f222';this.style.boxShadow='0 2px 12px rgba(121,80,242,0.07)'"
      >
        <span style="font-size:11px;font-weight:800;letter-spacing:2px;color:#7950f2;text-transform:uppercase;display:block;margin-bottom:6px;">Topic ${idx+1}</span>
        ${q.q}
      </button>
    `).join("");
  } else {
    // Regular question card + stopwatch
    const el = state.sElapsed;
    const targetMs = data.targetSec * 1000;
    const pct = Math.min(1, el / targetMs);
    const over = el >= targetMs && el > 0;
    const swColor = over ? "#fa5252" : el >= targetMs * 0.75 ? "#ff922b" : c.color;

    document.getElementById("sCard").style.boxShadow = `0 8px 40px ${c.color}18, 0 2px 10px rgba(0,0,0,0.05)`;
    document.getElementById("sCard").style.border = `1.5px solid ${c.color}28`;
    document.getElementById("sBar").style.background = `linear-gradient(90deg, ${c.dark}, ${c.color})`;
    document.getElementById("sQLabel").style.color = c.color;
    document.getElementById("sQText").textContent = `"${state.sQ.q}"`;
    document.getElementById("sHints").innerHTML = state.sQ.hints.map((h, i) =>
      `<span style="${chipStyle(c, i)}">${h}</span>`).join("");

    const bigEl = document.getElementById("sBig");
    bigEl.textContent = formatSW(el);
    bigEl.style.color = swColor;
    bigEl.style.textShadow = state.sRunning ? `0 0 40px ${swColor}28` : "none";

    const fill = document.getElementById("sBarFill");
    fill.style.width = `${pct * 100}%`;
    fill.style.background = over ? "#fa5252" : el >= targetMs * 0.75 ? "#ff922b" : `linear-gradient(90deg, ${c.dark}, ${c.color})`;

    document.getElementById("sTarget").textContent = `目標 ${formatTarget(data.targetSec)}以内`;

    const startBtn = document.getElementById("sStartBtn");
    const stopBtn = document.getElementById("sStopBtn");
    const resetBtn = document.getElementById("sResetBtn");
    startBtn.classList.toggle("hidden", state.sRunning);
    stopBtn.classList.toggle("hidden", !state.sRunning);
    resetBtn.classList.toggle("hidden", el === 0);
    startBtn.style.cssText = primaryBtnStyle(c.color, c.dark, false);
    startBtn.textContent = "▶ スタート";

    document.getElementById("sOver").classList.toggle("hidden", !over);
  }

  document.getElementById("sNextBtn").style.cssText = dashedBtnStyle(c);
}

// ── PILLS ────────────────────────────────────────────────────────────
function renderPills(containerId, activeLevel, onClick) {
  const container = document.getElementById(containerId);
  container.innerHTML = LEVELS.map(lv => {
    const c = LC[lv], active = lv === activeLevel;
    const bg = active ? `linear-gradient(135deg, ${c.dark}, ${c.color})` : "#fff";
    const color = active ? "#fff" : c.color;
    const shadow = active ? `0 4px 14px ${c.color}44` : "none";
    const scale = active ? "scale(1.08)" : "scale(1)";
    return `<button onclick="(${onClick.toString()})('${lv}')"
      style="background:${bg};color:${color};border:2px solid ${c.color};border-radius:100px;padding:7px 16px;font-size:14px;font-weight:800;transition:all 0.2s;box-shadow:${shadow};transform:${scale};"
    >${c.emoji} ${lv}</button>`;
  }).join("");
}

function renderAll() { renderWriting(); renderSpeaking(); }

// ── WRITING ACTIONS ──────────────────────────────────────────────────
function wSetLevel(lv) {
  clearInterval(wTimer); wTimer = null;
  state.wLevel = lv; state.wTopic = pick(TOPICS[lv]);
  state.wTimeLeft = WMIN[lv] * 60; state.wRunning = false;
  animateCard("wCard", "popIn"); renderWriting();
}
function wStart() {
  state.wRunning = true; clearInterval(wTimer);
  wTimer = setInterval(() => {
    if (state.wTimeLeft <= 1) { clearInterval(wTimer); wTimer = null; state.wTimeLeft = 0; state.wRunning = false; }
    else { state.wTimeLeft--; }
    renderWriting();
  }, 1000);
  renderWriting();
}
function wPause() { clearInterval(wTimer); wTimer = null; state.wRunning = false; renderWriting(); }
function wReset() { clearInterval(wTimer); wTimer = null; state.wTimeLeft = WMIN[state.wLevel] * 60; state.wRunning = false; renderWriting(); }
function wNewTopic() {
  clearInterval(wTimer); wTimer = null;
  state.wTopic = pick(TOPICS[state.wLevel], state.wTopic.topic);
  state.wTimeLeft = WMIN[state.wLevel] * 60; state.wRunning = false;
  animateCard("wCard", "popIn"); renderWriting();
}

// ── SPEAKING ACTIONS ─────────────────────────────────────────────────
function sSetLevel(lv) {
  clearInterval(sTimer); clearInterval(s1PrepTimer); sTimer = null; s1PrepTimer = null;
  state.sLevel = lv; state.sRunning = false; state.sElapsed = 0;
  if (lv === "1級") {
    state.s1Questions = pick5(SPEAKING["1級"].questions);
    state.s1Selected = null;
    state.s1PrepLeft = 60;
    state1PrepStart();
  } else {
    state.sQ = pick(SPEAKING[lv].questions);
    state.s1Selected = null;
    animateCard("sCard", "slideUp");
  }
  renderSpeaking();
}
function state1PrepStart() {
  state.s1PrepRunning = true;
  s1PrepTimer = setInterval(() => {
    if (state.s1PrepLeft <= 1) {
      clearInterval(s1PrepTimer); s1PrepTimer = null;
      state.s1PrepLeft = 0; state.s1PrepRunning = false;
    } else { state.s1PrepLeft--; }
    renderSpeaking();
  }, 1000);
}
function s1SelectQ(idx) {
  clearInterval(s1PrepTimer); s1PrepTimer = null;
  state.s1Selected = state.s1Questions[idx];
  state.s1PrepRunning = false;
  state.sQ = state.s1Selected;
  state.sElapsed = 0; state.sRunning = true;
  sBase = performance.now();
  clearInterval(sTimer);
  sTimer = setInterval(() => { state.sElapsed = performance.now() - sBase; renderSpeaking(); }, 200);
  renderSpeaking();
}
function sStart() {
  state.sRunning = true;
  sBase = performance.now() - state.sElapsed; clearInterval(sTimer);
  sTimer = setInterval(() => { state.sElapsed = performance.now() - sBase; renderSpeaking(); }, 200);
  renderSpeaking();
}
function sStop() { clearInterval(sTimer); sTimer = null; state.sRunning = false; renderSpeaking(); }
function sReset() { clearInterval(sTimer); sTimer = null; state.sRunning = false; state.sElapsed = 0; renderSpeaking(); }
function sNewQ() {
  clearInterval(sTimer); clearInterval(s1PrepTimer); sTimer = null; s1PrepTimer = null;
  state.sRunning = false; state.sElapsed = 0;
  if (state.sLevel === "1級") {
    state.s1Questions = pick5(SPEAKING["1級"].questions);
    state.s1Selected = null;
    state.s1PrepLeft = 60;
    state1PrepStart();
  } else {
    state.sQ = pick(SPEAKING[state.sLevel].questions, state.sQ.q);
    animateCard("sCard", "slideUp");
  }
  renderSpeaking();
}

// ── ANIMATION HELPER ─────────────────────────────────────────────────
function animateCard(id, anim) {
  const el = document.getElementById(id);
  el.style.animation = "none"; el.offsetHeight;
  el.style.animation = `${anim} 0.35s cubic-bezier(0.34,1.56,0.64,1)`;
}

// ── START ────────────────────────────────────────────────────────────
init();
</script>
</body>
